name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build --if-present
      - name: Typecheck
        run: npm run lint
      - name: Run tests
        run: npm test

  ci-ok:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "CI passed"
